name: Build and publish to private ECR

on:
  push:
    branches:
      - main
      - "[0-9]*"
jobs:
  build:
    name: Publish image
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Build and push to ECR
        uses: citizensadvice/build-and-private-ecr-push-action@v3
        with:
          repository_name: gotenberg
          auth_token: ${{ secrets.GITHUB_TOKEN }}
          multiarch_build: enabled
          prod_image: true
