name: Build and publish to private ECR

on:
  push:
    branches:
      - main
      - "[0-9]*"
jobs:
  build:
    name: Publish image
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Build and push to ECR
        uses: citizensadvice/build-and-push-action@01ae8e8371b6a3d45d6bf85eb5130deaeec2ad8a
        with:
          aws_access_key: ${{ secrets.PUBLIC_PUSH_ECR_AWS_KEY }}
          aws_secret_key: ${{ secrets.PUBLIC_PUSH_ECR_AWS_SECRET }}
          dockerfile_context: '.'
          repository_name: gotenberg
          multiarch_build: 'enabled'
          auth_token: ${{ secrets.GITHUB_TOKEN }}
